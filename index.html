<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gauss Jordan 3x4</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:linear-gradient(135deg,#5b1022,#c97b93);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.contenedor{
    background:white;
    width:100%;
    max-width:600px;
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h1{
    color:#7b1e3a;
    margin-bottom:10px;
}

p{
    margin-bottom:20px;
    color:#555;
}

table{
    margin:auto;
    border-spacing:8px;
}

input{
    width:60px;
    height:45px;
    text-align:center;
    border:none;
    border-radius:10px;
    background:#f1f1f1;
    font-size:18px;
}

.botones{
    display:flex;
    gap:10px;
    margin-top:20px;
}

button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.resolver{
    background:#7b1e3a;
}

.resetear{
    background:#666;
}

button:hover{
    opacity:0.9;
}

.paso{
    margin-top:15px;
    background:#f8f1f4;
    padding:15px;
    border-radius:15px;
}

.paso h2{
    color:#7b1e3a;
    margin-bottom:10px;
}

td{
    border:1px solid #ccc;
    padding:8px;
    min-width:50px;
}

.resultado{
    font-size:22px;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="contenedor">

<h1>Método Gauss Jordan</h1>
<p>Resuelve matrices 3x4 paso por paso</p>

<table>

<tr>
<td><input type="number"></td>
<td><input type="number"></td>
<td><input type="number"></td>
<td><input type="number"></td>
</tr>

<tr>
<td><input type="number"></td>
<td><input type="number"></td>
<td><input type="number"></td>
<td><input type="number"></td>
</tr>

<tr>
<td><input type="number"></td>
<td><input type="number"></td>
<td><input type="number"></td>
<td><input type="number"></td>
</tr>

</table>

<div class="botones">
<button class="resolver" onclick="resolver()">Resolver</button>
<button class="resetear" onclick="resetear()">Resetear</button>
</div>

<div id="resultado"></div>

</div>

<script>

function redondear(num){
    return Math.round(num);
}

function mostrar(m,titulo){

let texto = `
<div class="paso">

<h2>${titulo}</h2>

<table>

<tr>
<td>${redondear(m[0][0])}</td>
<td>${redondear(m[0][1])}</td>
<td>${redondear(m[0][2])}</td>
<td>${redondear(m[0][3])}</td>
</tr>

<tr>
<td>${redondear(m[1][0])}</td>
<td>${redondear(m[1][1])}</td>
<td>${redondear(m[1][2])}</td>
<td>${redondear(m[1][3])}</td>
</tr>

<tr>
<td>${redondear(m[2][0])}</td>
<td>${redondear(m[2][1])}</td>
<td>${redondear(m[2][2])}</td>
<td>${redondear(m[2][3])}</td>
</tr>

</table>

</div>
`;

document.getElementById("resultado").innerHTML += texto;

}

function resolver(){

document.getElementById("resultado").innerHTML="";

let d = document.querySelectorAll("input");

let m = [

[
Number(d[0].value),
Number(d[1].value),
Number(d[2].value),
Number(d[3].value)
],

[
Number(d[4].value),
Number(d[5].value),
Number(d[6].value),
Number(d[7].value)
],

[
Number(d[8].value),
Number(d[9].value),
Number(d[10].value),
Number(d[11].value)
]

];

mostrar(m,"Matriz Inicial");

for(let i=0;i<3;i++){

let pivote = m[i][i];

for(let j=0;j<4;j++){
m[i][j] = m[i][j] / pivote;
}

mostrar(m,"Hacer pivote 1 en fila "+(i+1));

for(let k=0;k<3;k++){

if(k!=i){

let factor = m[k][i];

for(let j=0;j<4;j++){
m[k][j] = m[k][j] - factor * m[i][j];
}

mostrar(m,"Eliminar columna "+(i+1));

}

}

}

let final = `
<div class="paso">

<h2>Resultado Final</h2>

<div class="resultado"><b>a = ${redondear(m[0][3])}</b></div>

<div class="resultado"><b>b = ${redondear(m[1][3])}</b></div>

<div class="resultado"><b>c = ${redondear(m[2][3])}</b></div>

</div>
`;

document.getElementById("resultado").innerHTML += final;

}

function resetear(){

let inputs = document.querySelectorAll("input");

inputs.forEach(input=>{
input.value="";
});

document.getElementById("resultado").innerHTML="";

}

</script>

</body>
</html>
